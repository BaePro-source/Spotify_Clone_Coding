services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: spotify_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: spotify_db
    volumes:
      - spotify_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotify_user -d spotify_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Docker 환경에서는 localhost 대신 서비스명(db)을 써야 하므로 여기서 덮어씀
      DATABASE_URL: postgresql://spotify_user:password@db:5432/spotify_db
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python app/seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  spotify_pgdata:
